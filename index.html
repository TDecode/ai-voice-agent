<!DOCTYPE html>
<html>
<head>
  <title>AI Strategy Consultant</title>
  <script src="https://unpkg.com/@vapi-ai/web/dist/vapi.js"></script>
  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 120px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 40px;
    }

    button {
      background: #3b82f6;
      border: none;
      padding: 18px 40px;
      font-size: 18px;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    .mic {
      font-size: 60px;
      margin-bottom: 20px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }

    footer {
      margin-top: 100px;
      color: #64748b;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="mic">🎙️</div>

  <h1>AI Strategy Consultant</h1>
  <p>Talk to our AI agent to explore automation for your business.</p>

  <button onclick="startCall()">Start Conversation</button>

  <footer>
    Powered by Vapi
  </footer>

  <script>
    const vapi = new Vapi("debb1463-5dc9-4940-8d9b-dc6c77554454");

    function startCall() {
      vapi.start("92b6252c-5943-4358-b08a-ee7eaecf7867");
    }
  </script>

</body>
</html>
